<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer gear ring -->
  <g transform="translate(256,256)" filter="url(#shadow)">
    <!-- Gear teeth -->
    <g fill="url(#gear)">
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(0)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(45)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(90)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(135)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(180)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(225)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(270)"/>
      <rect x="-18" y="-168" width="36" height="40" rx="6" transform="rotate(315)"/>
    </g>
    <!-- Gear body ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#gear)" stroke-width="32"/>
    <circle cx="0" cy="0" r="96" fill="url(#bg)"/>
  </g>

  <!-- Inner circle accent -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="url(#inner)" stroke-width="3" opacity="0.5"/>

  <!-- Code brackets { } -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <!-- Left bracket { -->
    <path d="M-42,-48 C-42,-48 -56,-48 -56,-34 L-56,-12 C-56,-12 -56,0 -68,0 C-56,0 -56,12 -56,12 L-56,34 C-56,48 -42,48 -42,48"
          fill="none" stroke="url(#bracket)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket } -->
    <path d="M42,-48 C42,-48 56,-48 56,-34 L56,-12 C56,-12 56,0 68,0 C56,0 56,12 56,12 L56,34 C56,48 42,48 42,48"
          fill="none" stroke="url(#bracket)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tilde / wave in center -->
    <path d="M-18,0 C-12,-14 12,14 18,0"
          fill="none" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Circular arrow (automation/sync) -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <!-- Top-right arc arrow -->
    <path d="M60,-70 A95,95 0 0,1 80,40"
          fill="none" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
    <polygon points="84,46 72,30 92,32" fill="url(#arrow)"/>
    <!-- Bottom-left arc arrow -->
    <path d="M-60,70 A95,95 0 0,1 -80,-40"
          fill="none" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
    <polygon points="-84,-46 -72,-30 -92,-32" fill="url(#arrow)"/>
  </g>
</svg>
