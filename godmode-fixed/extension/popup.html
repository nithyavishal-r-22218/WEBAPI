<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --primary: #3D52A0;
      --secondary: #7091E6;
      --text: #1a1a2e;
      --text-muted: #8697C4;
      --border: #ADBBDA;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 10px;
    }
    :root.dark {
      --bg: #050508;
      --surface: #0d0d14;
      --primary: #7091E6;
      --secondary: #3D52A0;
      --text: #e8e8f0;
      --text-muted: #555570;
      --border: #1a1a2e;
      --danger: #ef4444;
      --success: #00d4aa;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 270px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      transition: background-color 0.25s, color 0.25s;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
      transition: background-color 0.25s, border-color 0.25s;
    }

    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .logo-icon {
      display: inline-flex; align-items: center; margin-right: 6px;
    }
    .logo span { color: var(--primary); transition: color 0.25s; }
    .logo em { color: var(--secondary); font-style: normal; transition: color 0.25s; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); transition: background 0.25s;
    }
    .rec-dot.active {
      background: var(--danger); box-shadow: 0 0 8px var(--danger);
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-muted); cursor: pointer; padding: 3px 7px; font-size: 11px;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .step-count {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
      transition: background-color 0.25s, border-color 0.25s;
    }
    .count-val {
      font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700;
      color: var(--primary); transition: color 0.25s;
    }
    .count-label {
      color: var(--text-muted); font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
      transition: color 0.25s;
    }

    .btn {
      border: none; border-radius: 8px; padding: 10px 14px;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; width: 100%; transition: filter 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-record { background: var(--primary); color: #fff; }
    .btn-record.recording { background: var(--danger); }

    .btn-send {
      background: transparent; color: var(--primary);
      border: 1px solid var(--border);
      transition: border-color 0.2s, filter 0.2s, transform 0.15s;
    }
    .btn-send:hover { border-color: var(--primary); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

    .btn-inspect { background: transparent; color: var(--primary); border: 1px solid var(--border); transition: border-color 0.2s, filter 0.2s, transform 0.15s; }
    .btn-inspect:hover { border-color: var(--primary); }
    .btn-inspect.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .locator-result { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-top: 4px; transition: all 0.25s; display: none; }
    .locator-result.show { display: block; }
    .locator-result-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .locator-result-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--primary); word-break: break-all; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; transition: all 0.25s; }
    .locator-result-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--text-muted); }

    .save-dialog {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; margin-top: 8px; display: flex; flex-direction: column; gap: 8px;
      transition: background-color 0.25s, border-color 0.25s;
    }
    .save-dialog-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      margin-bottom: 2px;
    }
    .save-option {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 12px; color: var(--text); transition: all 0.2s;
    }
    .save-option:hover { border-color: var(--primary); }
    .save-option.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, var(--bg)); }
    .save-option input[type="radio"] { accent-color: var(--primary); }

    .existing-select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; font-family: 'Inter', sans-serif; font-size: 12px;
      color: var(--text); width: 100%; transition: border-color 0.2s;
    }
    .existing-select:focus { outline: none; border-color: var(--primary); }

    .tabs {
      display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 8px 6px; background: none; border: none;
      color: var(--text-muted); font-size: 12px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--primary); border-bottom-color: var(--primary);
    }
    .tab-btn:hover { color: var(--primary); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-group {
      margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px;
    }
    .form-label {
      font-size: 11px; font-weight: 600; color: var(--text);
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .form-input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 12px;
      color: var(--text); transition: border-color 0.2s, background-color 0.2s;
    }
    .form-input:focus {
      outline: none; border-color: var(--primary); background: var(--surface);
    }

    .btn-save {
      background: var(--success); color: #fff; margin-top: 4px;
    }

    .status {
      font-size: 11px; color: var(--text-muted); text-align: center;
      min-height: 16px; transition: color 0.2s;
    }
    .status.ok { color: var(--success); }
    .status.err { color: var(--danger); }

    .footer-link {
      color: var(--primary); text-decoration: none; font-size: 11px;
      text-align: center; display: block; padding: 10px;
      border-top: 1px solid var(--border); font-weight: 500;
      transition: color 0.2s, border-color 0.25s; background: var(--surface);
    }
    .footer-link:hover { color: var(--secondary); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">
        <svg height="20" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="popupGrad" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="var(--primary)"/>
              <stop offset="100%" stop-color="var(--secondary)"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="26" height="26" rx="7" fill="url(#popupGrad)" opacity="0.12"/>
          <rect x="2" y="2" width="26" height="26" rx="7" stroke="url(#popupGrad)" stroke-width="1.5"/>
          <path d="M10 10L7 15L10 20" stroke="url(#popupGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 10L23 15L20 20" stroke="url(#popupGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="14" y1="9" x2="16" y2="21" stroke="url(#popupGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </span>
      <span>WEB</span><em>API</em>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀</button>
      <div class="rec-dot" id="recDot"></div>
    </div>
  </div>
  <div class="body">
    <div class="tabs">
      <button class="tab-btn active" data-tab="record">Record</button>
      <button class="tab-btn" data-tab="testcase">Save as Test</button>
    </div>

    <!-- Record Tab -->
    <div id="record" class="tab-content active">
      <div class="step-count">
        <div>
          <div class="count-val" id="stepCount">0</div>
          <div class="count-label">Steps Recorded</div>
        </div>
      </div>
      <button class="btn btn-record" id="recordBtn">⏺ START RECORDING</button>
      <button class="btn btn-inspect" id="inspectBtn">🎯 INSPECT ELEMENT</button>
      <div class="locator-result" id="locatorResult">
        <div class="locator-result-title">Selected Locator</div>
        <div class="locator-result-value" id="locatorValue">—</div>
        <div class="locator-result-meta"><span id="locatorType"></span><span id="locatorStrategy"></span></div>
      </div>
      <button class="btn btn-send" id="sendBtn" disabled>💾 SAVE AS TEST CASE</button>

      <!-- Save Dialog (hidden by default) -->
      <div id="saveDialog" style="display:none">
        <div class="save-dialog">
          <div class="save-dialog-title">Save recording to:</div>
          <label class="save-option selected" id="optNew">
            <input type="radio" name="saveMode" value="new" checked /> Create new test case
          </label>
          <label class="save-option" id="optExisting">
            <input type="radio" name="saveMode" value="existing" /> Add to existing test case
          </label>
          <select class="existing-select" id="existingSelect" style="display:none">
            <option value="">-- Select a test case --</option>
          </select>
          <div class="form-group">
            <input type="text" class="form-input" id="quickName" placeholder="Test case name" />
          </div>
          <button class="btn btn-save" id="confirmSaveBtn">💾 SAVE</button>
          <button class="btn btn-send" id="cancelSaveBtn">✕ CANCEL</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <!-- Save as Test Case Tab -->
    <div id="testcase" class="tab-content">
      <div class="step-count">
        <div>
          <div class="count-val" id="stepCount2">0</div>
          <div class="count-label">Steps to Save</div>
        </div>
      </div>
      <form id="testCaseForm">
        <div class="form-group">
          <label class="form-label">Test Name</label>
          <input type="text" class="form-input" id="tcName" placeholder="e.g., User Login Flow" required />
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-input" id="tcType" required>
            <option value="">Select type</option>
            <option value="UI">UI Automation</option>
            <option value="API">API Test</option>
            <option value="E2E">E2E Test</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Framework</label>
          <input type="text" class="form-input" id="tcFramework" placeholder="e.g., Selenium, Playwright" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="tcDescription" placeholder="Brief description" />
        </div>
        <button type="submit" class="btn btn-save" id="saveTestBtn">💾 SAVE TEST CASE</button>
        <div class="status" id="testStatus"></div>
      </form>
    </div>
  </div>
  <a href="http://localhost:3000" target="_blank" class="footer-link">Open Dashboard →</a>

  <script>
    let recording = false;
    let stepCount = 0;
    let existingTestCases = [];

    const recordBtn = document.getElementById('recordBtn');
    const sendBtn = document.getElementById('sendBtn');
    const inspectBtn = document.getElementById('inspectBtn');
    const locatorResult = document.getElementById('locatorResult');
    const locatorValueEl = document.getElementById('locatorValue');
    const locatorTypeEl = document.getElementById('locatorType');
    const locatorStrategyEl = document.getElementById('locatorStrategy');
    const stepCountEl = document.getElementById('stepCount');
    const stepCount2El = document.getElementById('stepCount2');
    const statusEl = document.getElementById('status');
    const testStatusEl = document.getElementById('testStatus');
    const recDot = document.getElementById('recDot');
    const themeToggle = document.getElementById('themeToggle');
    let inspectActive = false;
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    const testCaseForm = document.getElementById('testCaseForm');
    const tcNameInput = document.getElementById('tcName');
    const tcTypeSelect = document.getElementById('tcType');
    const tcFrameworkInput = document.getElementById('tcFramework');
    const tcDescriptionInput = document.getElementById('tcDescription');

    // Save dialog elements
    const saveDialog = document.getElementById('saveDialog');
    const optNew = document.getElementById('optNew');
    const optExisting = document.getElementById('optExisting');
    const existingSelect = document.getElementById('existingSelect');
    const quickNameInput = document.getElementById('quickName');
    const confirmSaveBtn = document.getElementById('confirmSaveBtn');
    const cancelSaveBtn = document.getElementById('cancelSaveBtn');
    const saveRadios = document.querySelectorAll('input[name="saveMode"]');

    // Apply saved theme
    const savedTheme = localStorage.getItem('webapi-popup-theme') || 'light';
    applyTheme(savedTheme);

    function applyTheme(mode) {
      if (mode === 'dark') {
        document.documentElement.classList.add('dark');
        themeToggle.textContent = '☀';
        themeToggle.title = 'Switch to light mode';
      } else {
        document.documentElement.classList.remove('dark');
        themeToggle.textContent = '🌙';
        themeToggle.title = 'Switch to dark mode';
      }
    }

    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark');
      const next = isDark ? 'light' : 'dark';
      localStorage.setItem('webapi-popup-theme', next);
      applyTheme(next);
    });

    // Tab switching
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(tc => tc.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      });
    });

    function setStatus(msg, type = '', isTest = false) {
      const el = isTest ? testStatusEl : statusEl;
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    // Fetch existing test cases from API
    function loadExistingTestCases() {
      chrome.runtime.sendMessage({ type: 'GET_TEST_CASES' }, (res) => {
        if (chrome.runtime.lastError || !res || res.error) return;
        existingTestCases = res.testCases || [];
        existingSelect.innerHTML = '<option value="">-- Select a test case --</option>';
        existingTestCases.forEach(tc => {
          const opt = document.createElement('option');
          opt.value = tc.id;
          opt.textContent = tc.name || tc.id;
          existingSelect.appendChild(opt);
        });
      });
    }

    // Init state
    chrome.runtime.sendMessage({ type: 'GET_STATE' }, (res) => {
      if (chrome.runtime.lastError || !res) return;
      recording = res.recording;
      stepCount = res.steps;
      updateUI();
    });
    loadExistingTestCases();

    function updateUI() {
      stepCountEl.textContent = stepCount;
      stepCount2El.textContent = stepCount;
      recordBtn.textContent = recording ? '⏹ STOP RECORDING' : '⏺ START RECORDING';
      recordBtn.className = 'btn btn-record' + (recording ? ' recording' : '');
      recDot.className = 'rec-dot' + (recording ? ' active' : '');
      sendBtn.disabled = stepCount === 0 || recording;
    }

    recordBtn.addEventListener('click', () => {
      const type = recording ? 'STOP_RECORDING' : 'START_RECORDING';
      chrome.runtime.sendMessage({ type }, (res) => {
        recording = !recording;
        if (!recording) stepCount = res.steps?.length || 0;
        else stepCount = 0;
        updateUI();
        setStatus(recording ? 'Recording started…' : `${stepCount} steps captured`, recording ? '' : 'ok');
      });
    });

    inspectBtn.addEventListener('click', () => {
      inspectActive = !inspectActive;
      inspectBtn.classList.toggle('active', inspectActive);
      inspectBtn.textContent = inspectActive ? '🎯 INSPECTING… (ESC to stop)' : '🎯 INSPECT ELEMENT';
      chrome.storage.local.set({ inspecting: inspectActive });
      // Also send message to active tab's content script
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) {
          chrome.tabs.sendMessage(tabs[0].id, { type: inspectActive ? 'START_INSPECT' : 'STOP_INSPECT' });
        }
      });
      if (inspectActive) setStatus('Click any element on the page to see locators', '');
      else { setStatus(''); locatorResult.classList.remove('show'); }
    });

    // Listen for locator selections from content script
    chrome.runtime.onMessage.addListener((msg) => {
      if (msg.type === 'LOCATOR_SELECTED' && msg.locator) {
        locatorResult.classList.add('show');
        locatorValueEl.textContent = msg.locator.value;
        locatorTypeEl.textContent = msg.locator.type;
        locatorStrategyEl.textContent = msg.locator.strategy.toUpperCase();
        setStatus('Locator captured ✓', 'ok');
      }
    });

    // Listen for inspect stop (ESC key in content script)
    chrome.storage.onChanged.addListener((changes) => {
      if (changes.inspecting && !changes.inspecting.newValue) {
        inspectActive = false;
        inspectBtn.classList.remove('active');
        inspectBtn.textContent = '🎯 INSPECT ELEMENT';
      }
    });

    // Save dialog radio handling
    saveRadios.forEach(radio => {
      radio.addEventListener('change', () => {
        const mode = document.querySelector('input[name="saveMode"]:checked').value;
        optNew.classList.toggle('selected', mode === 'new');
        optExisting.classList.toggle('selected', mode === 'existing');
        existingSelect.style.display = mode === 'existing' ? 'block' : 'none';
        quickNameInput.style.display = mode === 'new' ? 'block' : 'none';
      });
    });

    // Show save dialog when clicking "Save as Test Case"
    sendBtn.addEventListener('click', () => {
      loadExistingTestCases();
      saveDialog.style.display = 'block';
      sendBtn.style.display = 'none';
    });

    cancelSaveBtn.addEventListener('click', () => {
      saveDialog.style.display = 'none';
      sendBtn.style.display = '';
    });

    // Confirm save
    confirmSaveBtn.addEventListener('click', () => {
      const mode = document.querySelector('input[name="saveMode"]:checked').value;

      if (mode === 'new') {
        const name = quickNameInput.value.trim();
        if (!name) { setStatus('Please enter a test case name', 'err'); return; }
        setStatus('Saving new test case…');
        const testCase = {
          id: 'tc-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9),
          name,
          type: 'UI',
          framework: 'WebAPI Recorder',
          description: '',
          createdAt: new Date().toISOString(),
          source: 'chrome_extension'
        };
        chrome.runtime.sendMessage({ type: 'SAVE_TEST_CASE', testCase }, (res) => {
          if (res.error) { setStatus('Error: ' + res.error, 'err'); return; }
          setStatus('✓ Test case "' + name + '" saved!', 'ok');
          saveDialog.style.display = 'none';
          sendBtn.style.display = '';
          quickNameInput.value = '';
          stepCount = 0;
          updateUI();
        });
      } else {
        const selectedId = existingSelect.value;
        if (!selectedId) { setStatus('Please select a test case', 'err'); return; }
        const existing = existingTestCases.find(tc => tc.id === selectedId);
        setStatus('Saving to existing test case…');
        const testCase = {
          id: selectedId,
          name: existing?.name || selectedId,
          type: existing?.type || 'UI',
          framework: existing?.framework || 'WebAPI Recorder',
          description: existing?.description || '',
          createdAt: existing?.createdAt || new Date().toISOString(),
          source: 'chrome_extension'
        };
        chrome.runtime.sendMessage({ type: 'SAVE_TEST_CASE', testCase }, (res) => {
          if (res.error) { setStatus('Error: ' + res.error, 'err'); return; }
          setStatus('✓ Steps added to "' + (existing?.name || selectedId) + '"!', 'ok');
          saveDialog.style.display = 'none';
          sendBtn.style.display = '';
          stepCount = 0;
          updateUI();
        });
      }
    });

    testCaseForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = tcNameInput.value.trim();
      const type = tcTypeSelect.value;
      const framework = tcFrameworkInput.value.trim();
      const description = tcDescriptionInput.value.trim();

      if (!name || !type) {
        setStatus('Name and Type are required', 'err', true);
        return;
      }

      if (stepCount === 0) {
        setStatus('No steps recorded to save', 'err', true);
        return;
      }

      setStatus('Saving test case…', '', true);
      
      const testCase = {
        id: 'tc-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9),
        name,
        type,
        framework: framework || 'Unknown',
        description,
        createdAt: new Date().toISOString(),
        source: 'chrome_extension'
      };

      chrome.runtime.sendMessage({ type: 'SAVE_TEST_CASE', testCase }, (res) => {
        if (res.error) {
          setStatus('Error: ' + res.error, 'err', true);
          return;
        }
        setStatus('✓ Test case saved!', 'ok', true);
        tcNameInput.value = '';
        tcTypeSelect.value = '';
        tcFrameworkInput.value = '';
        tcDescriptionInput.value = '';
        stepCount = 0;
        updateUI();
      });
    });
  </script>
</body>
</html>
